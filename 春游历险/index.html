    <script id="embedded-story-graph-data" type="application/json">{"nodes": [{"id": "node_1", "content": "春天的森林本应充满欢声笑语，但此刻你却陷入了危机。为了追逐一只罕见的蝴蝶，你穿过密林后发现与队伍彻底失联。四周只有风吹树梢的沙沙声，太阳正向西沉去。你背囊里仅有半瓶水、一面反光镜和几个野营工具。如果你不能保持冷静并运用科学知识自救，你将在充满未知的森林里度过一个危险的夜晚。这是一场关于勇气与智慧的博弈，你的每一个决策都将决定能否重返营地。", "type": "normal", "metadata": {"image_prompt": "吉卜力风格，人物背着行囊立在密林深处，神色不安地环顾四周。层层叠叠的繁茂树丛间，西斜的橘色暖光投下长长的阴影，林间弥漫着静谧而又压抑的怀旧气息。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 1, "image_url": "https://file2.aitohumanize.com/file/6891e3d014d64d89a6695707acf9f000.png", "image_path": "./images/node_1.png"}}, {"id": "node_2", "content": "你站在幽暗的灌木丛边，大声呼喊后只有惊鸟回应。你的心跳如鼓点般撞击胸腔，手不受控制地颤抖，大脑一片空白。强烈的本能正驱使你立刻逃离这片死寂，你的呼吸变得急促而浅表，这是身体发出的极端压力信号。", "type": "ep_start", "metadata": {"chapter_title": "第1关 密林失联：与恐慌本能的博弈", "knowledge_point": "情绪识别与情绪管理", "primary_knowledge_point": "情绪识别与情绪管理", "supporting_knowledge_points": [], "knowledge_role_in_this_level": "主知识点推进", "image_prompt": "中景视角，人物神色惊惶，双手微颤地缩在幽暗灌木旁。斜阳穿透密林拉长了斑驳树影，呈现吉卜力式唯美又压抑的氛围。人物形象参考输入的第一张，背景参考第二张（如果有的话）", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/1b4865e1354043a4973f8d767dd44e09.png", "image_path": "./images/node_2.png"}}, {"id": "node_3", "content": "面对这种手抖、心跳加快且大脑空白的生理信号，你该采取哪种认知处理方式？", "type": "normal", "metadata": {"knowledge_point": "情绪识别与情绪管理", "primary_knowledge_point": "情绪识别与情绪管理", "supporting_knowledge_points": [], "image_prompt": "幽暗灌木旁，人物脸色苍白，双手因恐惧而止不住地颤抖，呼吸急促。夕阳的暖光斜穿密林，拉长了斑驳的树影，透着吉卜力式的孤寂与怀旧感。中景构图捕捉到其惊惶的神态。人物形象参考输入的第一张，背景参考第二张。", "scene_transition": 0, "image_url": "https://file5.aitohumanize.com/file/47ef20a9e9944438bc49f7ceaecf0016.png", "image_path": "./images/node_3.png"}}, {"id": "node_4", "content": "你闭上眼睛，不再抗拒手部的颤抖，而是将注意力集中在深长的腹式呼吸上。", "type": "decision", "metadata": {"choice_option": "将其判定为正常的应激恐慌，随后执行深呼吸法接纳并调节情绪。", "image_prompt": "人物闭着双眼，在幽暗的森林中深深吸气，双手虽微颤却自然垂下。金色的夕阳穿过密林，在人物平静的脸上投下斑驳光影。中景视角中，四周是层层叠叠的翠绿枝叶，氛围温馨而怀旧。人物形象参考输入的第一张，背景参考第二张。", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/e8ac8088ce0b40eead0fe4039611e7b4.png", "image_path": "./images/node_4.png"}}, {"id": "node_5", "content": "随着氧气充盈，疯狂跳动的心脏逐渐减速，原本发木的大脑重新恢复了理性控制。", "type": "ep_end", "metadata": {"physics_knowledge": "情绪识别与情绪管理\n\n解析：在极端环境下，识别生理信号与情绪的关联是自救的前提。通过承认并接纳正常的恐慌，利用呼吸调节机制降低交感神经的兴奋度，能有效重获前额叶皮层的理性控制权，阻止盲目逃生行为。\n\n知识点：情绪识别是管理的前提。情绪调节并非消除情绪，而是通过接纳其存在，利用生理反馈（如深呼吸、肌肉放松）干预心理状态。承认情绪的非道德性（即恐惧并非胆小）有助于缓解认知负荷。", "chapter_title": "第1关 密林失联：与恐慌本能的博弈", "knowledge_point": "情绪识别与情绪管理", "primary_knowledge_point": "情绪识别与情绪管理", "supporting_knowledge_points": [], "knowledge_role_in_this_level": "主知识点推进", "image_prompt": "中景视角下，人物在幽暗灌木旁闭目深呼吸，神情转为平静。暖橘色的夕阳斜穿林间，营造出吉卜力风格的温馨静谧感。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/d5d8f3b60fc143dd8c0eb9084e98ce65.png", "image_path": "./images/node_5.png"}}, {"id": "node_4_branch_1_decision", "content": "你咬紧牙关，在心里严厉地责备自己的软弱，试图靠意志力强行止住身体颤抖。", "type": "decision", "metadata": {"choice_option": "将其判定为胆小怯懦的表现，随后执行强制压抑指令并命令自己冷静。", "image_prompt": "中景镜头。在光线渐暗的森林中，人物紧缩着身体，咬紧牙关，双手用力握拳试图控制颤抖。脸部表情因极度克制而显得僵硬，眼神充满焦虑。吉卜力风格，温馨而略带忧伤的氛围。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file5.aitohumanize.com/file/9dd2b96dadfb406eb9f859c4f0044a15.png", "image_path": "./images/node_4_branch_1_decision.png"}}, {"id": "node_4_branch_1_fatal", "content": "强行的压抑反而加剧了潜意识的焦虑，你的视野变得更加狭窄，思维陷入了瘫痪状态。", "type": "fatal", "metadata": {"explanation": "这属于“压抑式伪管理”误区。将情绪管理等同于意志力压制，并将恐惧视为负面的性格缺陷，会产生次生焦虑。这种认知方式会增加大脑的认知负荷，导致后续判断力更快速地崩塌，无法进入理性的逻辑思考。", "physics_knowledge": "情绪识别与情绪管理\n\n错误原因：这属于“压抑式伪管理”误区。将情绪管理等同于意志力压制，并将恐惧视为负面的性格缺陷，会产生次生焦虑。这种认知方式会增加大脑的认知负荷，导致后续判断力更快速地崩塌，无法进入理性的逻辑思考。\n\n知识点：情绪管理遵循“识别—接纳—干预”的逻辑链条。情绪识别是管理的前提，需明确情绪具有非道德性，如恐惧仅是生物演化中的预警机制而非性格缺陷。压抑式管理试图通过意志力强行抹除情绪，这会显著增加大脑认知负荷，诱发次生焦虑并导致理性判断力崩塌。科学的管理方式应承认情绪存在的客观性，通过深呼吸等生理反馈调节植物神经系统，降低认知损耗，实现心理状态的稳态调节。", "knowledge_point": "情绪识别与情绪管理", "primary_knowledge_point": "情绪识别与情绪管理", "supporting_knowledge_points": [], "knowledge_role_in_this_level": "主知识点推进", "wrong_explanation": "这属于“压抑式伪管理”误区。将情绪管理等同于意志力压制，并将恐惧视为负面的性格缺陷，会产生次生焦虑。这种认知方式会增加大脑的认知负荷，导致后续判断力更快速地崩塌，无法进入理性的逻辑思考。", "correct_knowledge_ref": "情绪识别是管理的前提。情绪调节并非消除情绪，而是通过接纳其存在，利用生理反馈（如深呼吸、肌肉放松）干预心理状态。承认情绪的非道德性（即恐惧并非胆小）有助于缓解认知负荷。", "image_prompt": "人物在幽暗灌木旁僵立，双手因极度焦虑而剧烈颤抖，眼神中透着无助与惊惶。西斜的橘红阳光穿过繁密枝叶，在地面拉出深长的树影。中景视角下，整片森林显得深邃压抑，呈现吉卜力手绘的怀旧质感。人物形象参考输入的第一张，背景参考第二张（如果有的话）", "scene_transition": 0, "image_url": "https://file4.aitohumanize.com/file/f26c5553cccc4563b7fa095400d3f402.png", "image_path": "./images/node_4_branch_1_fatal.png"}}, {"id": "node_4_branch_2_decision", "content": "你认为这种不安来自周围的危险，于是用尽全身力气对着空旷的森林疯狂嘶喊。", "type": "decision", "metadata": {"choice_option": "将其判定为环境威胁的预警，随后执行原地大声呼喊以试图吸引救援。", "image_prompt": "吉卜力风格。近景，人物站在密林的灌木丛旁，绝望地仰起头，张大嘴巴向着空旷的森林用尽全身力气疯狂地嘶喊，眼角带着泪光，双手因极度恐惧而紧紧抓着胸口的衣服，身体剧烈颤抖，呼吸急促。背景是茂密幽暗的树林，夕阳的余晖透过层层叠叠的树叶投下斑驳阴影，光线正一点点暗淡下去，空气中弥漫着压抑和死寂的氛围，周围除了惊乱飞起的鸟儿，只有风吹树梢的沙沙声。人物形象参考输入的第一张。", "scene_transition": 0, "image_url": "https://file3.aitohumanize.com/file/0f2916d6e13b41698c6be8d7b86ac629.png", "image_path": "./images/node_4_branch_2_decision.png"}}, {"id": "node_4_branch_2_fatal", "content": "连续的尖叫让你感到头晕目眩且体力迅速流失，而寂静的森林并未给你任何有效回音。", "type": "fatal", "metadata": {"explanation": "这属于“行动化误判”误区。未能将生理信号识别为“情绪”，而是将其错误地解读为“必须立刻行动”的指令。在未平复情绪时大声呼喊会加剧过度换气，导致二氧化碳排出过多而头晕，且在无人区盲目呼喊会白白浪费体力。", "physics_knowledge": "情绪识别与情绪管理\n\n错误原因：这属于“行动化误判”误区。未能将生理信号识别为“情绪”，而是将其错误地解读为“必须立刻行动”的指令。在未平复情绪时大声呼喊会加剧过度换气，导致二氧化碳排出过多而头晕，且在无人区盲目呼喊会白白浪费体力。\n\n知识点：情绪识别是情绪管理的逻辑起点，其核心是将生理信号界定为内在状态而非行动指令。情绪调节的公式为：识别+接纳+生理干预。若将恐惧误判为必须立即执行的“行动化”指令（如盲目呼喊），会导致过度换气，使二氧化碳排出过多引发头晕并损耗体力。情绪本身不具道德属性，承认其存在能降低认知负荷，利用深呼吸等生理反馈可实现心理状态的平稳过渡。", "knowledge_point": "情绪识别与情绪管理", "primary_knowledge_point": "情绪识别与情绪管理", "supporting_knowledge_points": [], "knowledge_role_in_this_level": "主知识点推进", "wrong_explanation": "这属于“行动化误判”误区。未能将生理信号识别为“情绪”，而是将其错误地解读为“必须立刻行动”的指令。在未平复情绪时大声呼喊会加剧过度换气，导致二氧化碳排出过多而头晕，且在无人区盲目呼喊会白白浪费体力。", "correct_knowledge_ref": "情绪识别是管理的前提。情绪调节并非消除情绪，而是通过接纳其存在，利用生理反馈（如深呼吸、肌肉放松）干预心理状态。承认情绪的非道德性（即恐惧并非胆小）有助于缓解认知负荷。", "image_prompt": "中景视角，人物无力地扶着树干，表情疲惫眩晕。暖色夕阳斜穿茂密林间，营造出一种孤寂而忧伤的氛围。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/fcea6d4a5ffb4a8baecc7cb772c09f18.png", "image_path": "./images/node_4_branch_2_fatal.png"}}, {"id": "node_6", "content": "当你终于能平静地听清风声时，你意识到太阳正一点点向地平线沉去。虽然手心还有汗水，但你已经明白：枯坐原地无法脱困，你必须在光线消失前，为自己定下一个前进的方向。 森林里的树木层层叠叠，像复制粘贴一样。营地在森林北侧，这是你脑中唯一的坐标。此时，西斜的太阳挂在你的右后方，拉长了树影。你意识到，必须在光线彻底消失前，选定一个最可靠的参照物来确定方向。", "type": "ep_start", "metadata": {"chapter_title": "第2关 绝境定向：寻找消失的北方", "knowledge_point": "地图阅读与方向判断", "primary_knowledge_point": "地图阅读与方向判断", "supporting_knowledge_points": ["情绪识别与情绪管理"], "knowledge_role_in_this_level": "主知识点推进", "image_prompt": "人物冷静地站在林间，抬手遮挡右后方投来的金色余晖，脚下树影长伸。吉卜力风格的森林温馨怀旧，中景展现其坚毅眼神。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/2ab070bebb15487f8f84bfab4a6e9334.png", "image_path": "./images/node_6.png"}}, {"id": "node_7", "content": "在目前这种茂密的森林环境下，你该将哪种自然现象作为核心定向参照来推导北方？", "type": "normal", "metadata": {"knowledge_point": "地图阅读与方向判断", "primary_knowledge_point": "地图阅读与方向判断", "supporting_knowledge_points": ["情绪识别与情绪管理"], "image_prompt": "中景视角下，人物在幽暗森林边驻足观察，神情专注。暖色夕阳从右后方斜射，将长长的树影投向前方，画面呈现吉卜力式治愈而怀旧的质感。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file3.aitohumanize.com/file/dd21ab4b2a264ca89da69d0fbb11d24d.png", "image_path": "./images/node_7.png"}}, {"id": "node_8", "content": "你转过身正对着正在下沉的暖阳，并在松软的泥土上画出了一个方位的十字坐标。", "type": "decision", "metadata": {"choice_option": "将西斜的太阳作为参照，应用“下午太阳位于西方，面朝太阳右转”的逻辑。", "image_prompt": "中景视角，人物正对着沉落的暖阳，在林间泥土上专注地画出十字坐标。金橘色余晖洒满四周，树影斑驳，营造出吉卜力式温馨怀旧的氛围。\n\n人物形象参考输入的第一张，背景参考第二张（如果有的话）", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/601139b7381e40ccb8e40d1f80493c78.png", "image_path": "./images/node_8.png"}}, {"id": "node_9", "content": "根据太阳落下的西方，你迅速推算出北方就在右手边，视线尽头出现了一道模糊山脊。", "type": "ep_end", "metadata": {"physics_knowledge": "地图阅读与方向判断\n\n解析：利用天体运行规律判别方位具有最高的科学稳定性。在下午，太阳必然位于西方。通过确定西方，可以利用地理方位的相对位置（面朝西，右为北）准确推导出目标方向，从而避免了生物特征带来的局部干扰。\n\n知识点：北半球（除极地外）太阳总是东升西落。下午时分太阳位于偏西方向。判定方位时，若面朝西，则右手方向为北，左手方向为南，背后方向为东。", "chapter_title": "第2关 绝境定向：寻找消失的北方", "knowledge_point": "地图阅读与方向判断", "primary_knowledge_point": "地图阅读与方向判断", "supporting_knowledge_points": ["情绪识别与情绪管理"], "knowledge_role_in_this_level": "主知识点推进", "image_prompt": "吉卜力风格，金色的夕阳中，人物站在泥地坐标旁，右手指向视线尽头模糊浮现的山脊，神情坚定且充满希望。人物形象参考输入的第一张。", "scene_transition": 0, "image_url": "https://file2.aitohumanize.com/file/e464d704ac6948b6b68ec63144103cd6.png", "image_path": "./images/node_9.png"}}, {"id": "node_8_branch_1_decision", "content": "你蹲下身子，仔细观察几棵大树根部青绿色的苔藓，试图寻找它们分布最密集的方位。", "type": "decision", "metadata": {"choice_option": "将树干苔藓作为参照，应用“苔藓喜阴，分布最茂盛的一侧必然指向北方”的逻辑。", "image_prompt": "吉卜力风格，夕阳透过茂密森林洒下斑驳光影，光线温馨。人物正蹲下身子，专注地端详着身前一棵老树根部那层湿润、青绿的苔藓，伸出一只手轻轻触摸，若有所思。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/d0af22f830a54f2180bb8b8ea73b35f9.png", "image_path": "./images/node_8_branch_1_decision.png"}}, {"id": "node_8_branch_1_fatal", "content": "你发现不同树木的苔藓分布各异，复杂的林间阴影和局部湿度让你彻底陷入了方向混乱。", "type": "fatal", "metadata": {"explanation": "这是一个典型的经验主义误区。苔藓虽然喜阴，但在森林内部，水分和遮阴情况受地形、溪流和林冠层重叠的影响极大。在潮湿的林区，苔藓可能长在树干的任何一侧，并不具有普适的地理定向价值。", "physics_knowledge": "地图阅读与方向判断\n\n错误原因：这是一个典型的经验主义误区。苔藓虽然喜阴，但在森林内部，水分和遮阴情况受地形、溪流和林冠层重叠的影响极大。在潮湿的林区，苔藓可能长在树干的任何一侧，并不具有普适的地理定向价值。\n\n知识点：野外定向的核心在于利用恒定的天文参照物。北半球中纬度地区，太阳视运动遵循东升西落规律，下午时分太阳位于偏西方向。根据空间坐标判定，若面朝西方，则右手方向为北，左手方向为南。相比之下，苔藓等生物特征受局部水分、地形及林冠遮阴影响显著，在潮湿森林中常呈全方位分布，不具备普适的地理定向价值。科学判定应优先依赖天文常数而非多变的生物经验。", "knowledge_point": "地图阅读与方向判断", "primary_knowledge_point": "地图阅读与方向判断", "supporting_knowledge_points": ["情绪识别与情绪管理"], "knowledge_role_in_this_level": "主知识点推进", "wrong_explanation": "这是一个典型的经验主义误区。苔藓虽然喜阴，但在森林内部，水分和遮阴情况受地形、溪流和林冠层重叠的影响极大。在潮湿的林区，苔藓可能长在树干的任何一侧，并不具有普适的地理定向价值。", "correct_knowledge_ref": "北半球（除极地外）太阳总是东升西落。下午时分太阳位于偏西方向。判定方位时，若面朝西，则右手方向为北，左手方向为南，背后方向为东。", "image_prompt": "人物蹲在粗糙树根前，神情困惑地观察着湿润青苔。夕阳穿过茂密枝叶，在林间投下杂乱交错的深邃阴影。近景视角下，斑驳的金色光点与浓绿森林交织，透着一种迷失其中的怀旧气息。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file5.aitohumanize.com/file/a7d632cd620948b48e2ecca7a12affc6.png", "image_path": "./images/node_8_branch_1_fatal.png"}}, {"id": "node_8_branch_2_decision", "content": "你仰起头对比着头顶上方交错的枝叶，试图找出哪一侧的叶片生长得更加繁茂向外。", "type": "decision", "metadata": {"choice_option": "将树木枝叶作为参照，应用“植物向光，枝叶生长最茂密的一侧即为南方”的逻辑。", "image_prompt": "中景，人物站在密林中，仰起头全神贯注地凝视着头顶上方。头顶交错的枝叶被柔和的金色阳光穿透，光斑错落。人物手指轻轻点向树冠，对比着哪一侧的叶片生长得更加繁茂向外。吉卜力风格，温馨怀旧。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file2.aitohumanize.com/file/c95d752cd5ae49fd9860d305f73e0333.png", "image_path": "./images/node_8_branch_2_decision.png"}}, {"id": "node_8_branch_2_fatal", "content": "密林中的树木为了争夺阳光，枝叶都向林间空隙处挤压，导致每棵树的指向完全不同。", "type": "fatal", "metadata": {"explanation": "植物向光性在开阔地带确实存在，但在密林深处，树木的生长主要受“林窗效应”影响，即哪里的上方有空隙，枝干就往哪里生长以获取光照。这种受竞争影响的生物特征在森林中极不可靠。", "physics_knowledge": "地图阅读与方向判断\n\n错误原因：植物向光性在开阔地带确实存在，但在密林深处，树木的生长主要受“林窗效应”影响，即哪里的上方有空隙，枝干就往哪里生长以获取光照。这种受竞争影响的生物特征在森林中极不可靠。\n\n知识点：在野外定向中，利用天体运行规律判定方位具有高度的稳定性。北半球中纬度地区，太阳每日经南天东升西落，午后时分太阳位于偏西方向。以太阳位置为参照，若面朝西方，则右手方向为北，左手方向为南。相比之下，生物特征如树木枝叶的生长方向在密林中受“林窗效应”等局部光照竞争影响，具有显著的随机性，并非可靠的定向依据。准确的方向判断应优先依赖太阳方位角等天文物理指标，而非易受环境干扰的生物形态。", "knowledge_point": "地图阅读与方向判断", "primary_knowledge_point": "地图阅读与方向判断", "supporting_knowledge_points": ["情绪识别与情绪管理"], "knowledge_role_in_this_level": "主知识点推进", "wrong_explanation": "植物向光性在开阔地带确实存在，但在密林深处，树木的生长主要受“林窗效应”影响，即哪里的上方有空隙，枝干就往哪里生长以获取光照。这种受竞争影响的生物特征在森林中极不可靠。", "correct_knowledge_ref": "北半球（除极地外）太阳总是东升西落。下午时分太阳位于偏西方向。判定方位时，若面朝西，则右手方向为北，左手方向为南，背后方向为东。", "image_prompt": "中景镜头，吉卜力风格，温馨怀旧。夕阳余晖斜照，人物仰着头，一脸迷茫地看着密密麻麻、方向不一的枝叶。森林里，树木层层叠叠，像被复制粘贴一样，让人眼花缭乱。人物形象参考输入的第一张。", "scene_transition": 0, "image_url": "https://file2.aitohumanize.com/file/85802d5ebc774f2eb6c995537b1e8ffe.png", "image_path": "./images/node_8_branch_2_fatal.png"}}, {"id": "node_10", "content": "明确了北方后，你收起工具准备出发。然而，知道方向并不代表路好走，原本平坦的林地前方，逐渐露出了嶙峋的岩石和深不见底的沟壑。 你拨开灌木向前挺进，原本平坦的林地消失了，取而代之的是起伏剧烈的山地。左侧是乱石嶙峋的陡坡，正前方是等高线向低处凸出的隆起脊线，右侧则是植被茂密、地势最低的深沟。你必须选出最稳妥的路径。", "type": "ep_start", "metadata": {"chapter_title": "第3关 山脊深谷：选择求生之路", "knowledge_point": "地形地貌与地表特征", "primary_knowledge_point": "地形地貌与地表特征", "supporting_knowledge_points": ["地图阅读与方向判断"], "knowledge_role_in_this_level": "主知识点推进", "image_prompt": "吉卜力风，夕阳洒在林间。人物拨开灌木，凝视前方干燥的山脊，神色坚定。中景视角下，金晖与嶙峋岩石交错，氛围怀旧温暖。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/e9b49d17cce44ddda5629d24ed2ef93d.png", "image_path": "./images/node_10.png"}}, {"id": "node_11", "content": "根据地形地貌的特征与野外生存逻辑，你应当优先选择哪种地形部位作为行进路径？", "type": "normal", "metadata": {"knowledge_point": "地形地貌与地表特征", "primary_knowledge_point": "地形地貌与地表特征", "supporting_knowledge_points": ["地图阅读与方向判断"], "image_prompt": "人物背着行囊立于山地边缘，一手遮眉眺望，前方左侧是陡峭乱石坡，右侧为茂密深沟，中间一条脊线通向远方。夕阳余晖洒在层林，氛围温馨怀旧。吉卜力风格的中景画面。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 1, "image_url": "https://file4.aitohumanize.com/file/092541ced6ae49aa8afed1b1d3990268.png", "image_path": "./images/node_11.png"}}, {"id": "node_12", "content": "你手脚并用爬上那条隆起的脊线，沿着相对干燥且植被稀疏的山背稳步向下移动。", "type": "decision", "metadata": {"choice_option": "优先选择地势较高、视野开阔的山脊线，利用其干燥且易于观察的特性行进。", "image_prompt": "人物手脚并用地翻过突起的岩石，沿着干燥疏朗的山脊稳步下行。暖橘色的落日余晖洒向大地，远方群山轮廓柔和，微风拂过稀疏的草木，画面温馨而宁静。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/a6011cc952c94ead970203c5630f65be.png", "image_path": "./images/node_12.png"}}, {"id": "node_13", "content": "站得高看得远，你不仅避开了丛林障碍，还在远处的半山腰发现了一抹流动的银色水光。", "type": "ep_end", "metadata": {"physics_knowledge": "地形地貌与地表特征\n\n解析：山脊是等高线向低处凸出的部位。在野外生存中，山脊地势高、视野广，既方便观察周围地貌寻找出路，也更容易被搜救人员发现。同时，山脊避开了山谷可能存在的山洪、淤泥和致密植被，是风险最低的路径。\n\n知识点：地形是地表高低起伏的总体形态。山脊是连绵的高地，其地表特征通常比山谷干燥、开阔。认识地形地貌有助于我们在复杂环境中识别潜在危险并规划最科学的交通路线。", "chapter_title": "第3关 山脊深谷：选择求生之路", "knowledge_point": "地形地貌与地表特征", "primary_knowledge_point": "地形地貌与地表特征", "supporting_knowledge_points": ["地图阅读与方向判断"], "knowledge_role_in_this_level": "主知识点推进", "image_prompt": "人物站在开阔的山脊上，迎着温暖的落日欣喜远眺。远处山间，一抹闪烁的银色水光在金色的草木中若隐若现。中远景构图，画面宁静治愈，吉卜力怀旧风格。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file4.aitohumanize.com/file/fd912606a0c64988892ed7bbacf2ae89.png", "image_path": "./images/node_13.png"}}, {"id": "node_12_branch_1_decision", "content": "你顺着坡度钻进幽暗的山谷，试图在最底部的平坦地面寻找一条通往山下的捷径。", "type": "decision", "metadata": {"choice_option": "优先选择地势最低、看似平坦的山谷底，利用其重力逻辑顺着汇水方向行进。", "image_prompt": "人物猫着腰，拨开茂密的低矮灌木和高高的草丛，深一脚浅一脚地往幽暗湿滑的谷底钻去，表情充满探寻。四周树冠浓密，阳光几乎无法透射，环境潮湿昏暗，充满未知。中景镜头，人物形象参考输入的第一张。", "scene_transition": 1, "image_url": "https://file1.aitohumanize.com/file/f182c9d1500d47188f2d71dfdea1a8e1.png", "image_path": "./images/node_12_branch_1_decision.png"}}, {"id": "node_12_branch_1_fatal", "content": "谷底积水严重且草丛没过头顶，浓密的树冠遮蔽了视线，你很快就彻底失去了方位感。", "type": "fatal", "metadata": {"explanation": "这是典型的“重力路径依赖”误区。山谷是等高线向高处凸出的汇水部位。虽然看起来省力，但山谷地表特征复杂，植被最茂密，视野极差，且在雨后极易发生山洪或泥石流，是野外行进中最危险的区域。", "physics_knowledge": "地形地貌与地表特征\n\n错误原因：这是典型的“重力路径依赖”误区。山谷是等高线向高处凸出的汇水部位。虽然看起来省力，但山谷地表特征复杂，植被最茂密，视野极差，且在雨后极易发生山洪或泥石流，是野外行进中最危险的区域。\n\n知识点：地形地貌指地表起伏的空间形态。山谷是等高线向高处凸出的汇水部位，受水分富集影响，其地表植被茂密、视野受限，且在降水后易诱发山洪或泥石流等灾害。山脊则是等高线向低处凸出的连绵高地，地表相对干燥、开阔。野外行进中，山谷虽具重力路径优势，但其复杂的水文与生物特征使其危险性显著高于视野开阔、排水良好的山脊。", "knowledge_point": "地形地貌与地表特征", "primary_knowledge_point": "地形地貌与地表特征", "supporting_knowledge_points": ["地图阅读与方向判断"], "knowledge_role_in_this_level": "主知识点推进", "wrong_explanation": "这是典型的“重力路径依赖”误区。山谷是等高线向高处凸出的汇水部位。虽然看起来省力，但山谷地表特征复杂，植被最茂密，视野极差，且在雨后极易发生山洪或泥石流，是野外行进中最危险的区域。", "correct_knowledge_ref": "地形是地表高低起伏的总体形态。山脊是连绵的高地，其地表特征通常比山谷干燥、开阔。认识地形地貌有助于我们在复杂环境中识别潜在危险并规划最科学的交通路线。", "image_prompt": "吉卜力风格。迷失在谷底幽暗泥泞的水洼中，人物拨开没过头顶的浓密草丛，神情慌乱地张望，却被严实的树冠遮挡了视线。中景。人物形象参考输入的第一张。", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/b7c123c81d524d0788fb2fdd728ab498.png", "image_path": "./images/node_12_branch_1_fatal.png"}}, {"id": "node_12_branch_2_decision", "content": "你钻进半山腰茂密的丛林中，试图利用厚实的树冠层来躲避山顶凛冽的寒风。", "type": "decision", "metadata": {"choice_option": "优先选择植被茂密、避风隐蔽的缓坡林，利用其环境遮蔽且温差较小的特性行进。", "image_prompt": "吉卜力风格，中景。人物紧缩着身体钻进茂密、低矮的树丛深处，茂密的枝叶如同一把把绿伞，将大部分天光挡在外面，也隔绝了高处的寒风。阳光透过层层树叶，形成斑驳温暖的光点撒在人物脸上，营造出安全、怀旧的氛围。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 1, "image_url": "https://file1.aitohumanize.com/file/2f50f5e7ddee45c697e416cb083beddf.png", "image_path": "./images/node_12_branch_2_decision.png"}}, {"id": "node_12_branch_2_fatal", "content": "密林中横七竖八的倒木让你举步维艰，且由于缺乏参照物，你在林子里绕起了圈子。", "type": "fatal", "metadata": {"explanation": "这属于“单一线索过度泛化”误区。虽然林地避风，但在求生初期，视野和通行效率优先级更高。缓坡密林地表特征复杂，极易消耗体力且无法观察远方地形，导致求生者陷入“林中打转”的困境。", "physics_knowledge": "地形地貌与地表特征\n\n错误原因：这属于“单一线索过度泛化”误区。虽然林地避风，但在求生初期，视野和通行效率优先级更高。缓坡密林地表特征复杂，极易消耗体力且无法观察远方地形，导致求生者陷入“林中打转”的困境。\n\n知识点：地形是地表高低起伏的总体形态。山脊是连绵的高地，其地表特征通常比山谷干燥、开阔。认识地形地貌有助于我们在复杂环境中识别潜在危险并规划最科学的交通路线。", "knowledge_point": "地形地貌与地表特征", "primary_knowledge_point": "地形地貌与地表特征", "supporting_knowledge_points": ["地图阅读与方向判断"], "knowledge_role_in_this_level": "主知识点推进", "wrong_explanation": "这属于“单一线索过度泛化”误区。虽然林地避风，但在求生初期，视野和通行效率优先级更高。缓坡密林地表特征复杂，极易消耗体力且无法观察远方地形，导致求生者陷入“林中打转”的困境。", "correct_knowledge_ref": "地形是地表高低起伏的总体形态。山脊是连绵的高地，其地表特征通常比山谷干燥、开阔。认识地形地貌有助于我们在复杂环境中识别潜在危险并规划最科学的交通路线。", "image_prompt": "人物在一片昏暗的密林中踉跄前行，他神色疲惫，衣衫被树枝挂得凌乱。四周全是横七竖八、布满苔藓的倒木，构成了一道道难以逾越的障碍。他正费力地跨过一根粗壮的树干，却发现前方依然是迷宫般相似的景象，眼神中透出一丝迷茫。光线透过浓密的树冠，只洒下斑驳而微弱的光影，使得林中显得更加幽暗潮湿，透出一股温馨却又令人迷失的怀旧气息。中景镜头清晰地捕捉到了人物举步维艰的状态。人物形象参考输入的第一张。", "scene_transition": 0, "image_url": "https://file5.aitohumanize.com/file/0d5f7b5e941f45d68146b0efbe62735e.png", "image_path": "./images/node_12_branch_2_fatal.png"}}, {"id": "node_14", "content": "你顺着平缓的山脊稳步下行，终于到达了半山腰。此时，空气中传来了湿润的水汽感，一条清澈的小溪出现在前方。然而，长途跋涉让你口渴难耐，生存的下一个考验接踵而至。 你来到溪边，嗓子干得像被火烧过。虽然溪水看起来清澈，但上游有动物活动的痕迹，直接饮用极可能导致腹泻。你剪开空水瓶，准备利用身边的碎石、细沙、木炭和布料制作一个简易过滤器。", "type": "ep_start", "metadata": {"chapter_title": "第4关 生命之泉：简易过滤器的层级智慧", "knowledge_point": "水的组成与净化", "primary_knowledge_point": "水的组成与净化", "supporting_knowledge_points": ["地形地貌与地表特征"], "knowledge_role_in_this_level": "主知识点推进", "image_prompt": "人物跪在波光粼粼的小溪边，神情疲惫却坚定，正聚精会神地准备简易滤水瓶。四周环绕着茂密的森林，暖橘色的夕阳光穿过林梢，水汽升腾，呈现出静谧的怀旧氛围。中景侧拍，画面温润细腻。人物形象参考输入的第一张，背景参考第二张。", "scene_transition": 1, "image_url": "https://file5.aitohumanize.com/file/1b50fdc3f36144068b7886a403d7262d.png", "image_path": "./images/node_14.png"}}, {"id": "node_15", "content": "为了获得最佳的过滤效果并防止装置堵塞，你应按照从顶端到底部的什么顺序填充材料？", "type": "normal", "metadata": {"knowledge_point": "水的组成与净化", "primary_knowledge_point": "水的组成与净化", "supporting_knowledge_points": ["地形地貌与地表特征"], "image_prompt": "人物神情认真地蹲在清澈溪边，正往剪开的空瓶里摆放碎石与细沙。柔和的夕阳穿过枝叶，溪水散发着温润的水汽，充满吉卜力式的怀旧感。近景构图聚焦于忙碌的双手。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file4.aitohumanize.com/file/2c20fd4944b94e4fab222e802999ab22.png", "image_path": "./images/node_15.png"}}, {"id": "node_16", "content": "你按照大颗粒在上、细颗粒在下的逻辑填入材料，最后在瓶口垫上布料进行收尾。", "type": "decision", "metadata": {"choice_option": "依次填充碎石、细沙、木炭，利用颗粒度由大到小的梯度拦截水中杂质。", "image_prompt": "吉卜力风格，溪边暖阳下，人物专注地往瓶中填入碎石，最后在瓶口垫上布料，神情认真。人物形象参考输入的第一张。", "scene_transition": 0, "image_url": "https://file5.aitohumanize.com/file/cebe693a26954d3b8b777bd51bebc243.png", "image_path": "./images/node_16.png"}}, {"id": "node_17", "content": "浑浊的溪水经过层层拦截变得透明，木炭去除了异味，清澈的水滴进了你的杯子。", "type": "ep_end", "metadata": {"physics_knowledge": "水的组成与净化\n\n解析：利用物理过滤的颗粒度梯度原理，上层粗颗粒先拦截大型漂浮物，避免下层细小孔隙过快堵塞；中层细沙拦截微小悬浮物；木炭则负责吸附色素和异味。这种由粗到细的结构能最大化过滤效率。\n\n知识点：过滤是分离不溶性固体与液体的一种基本方法。在多层过滤中，通过逐级减小滤料孔隙，可以实现高效拦截并延长过滤器使用寿命，活性炭则利用多孔结构进行物理吸附。", "chapter_title": "第4关 生命之泉：简易过滤器的层级智慧", "knowledge_point": "水的组成与净化", "primary_knowledge_point": "水的组成与净化", "supporting_knowledge_points": ["地形地貌与地表特征"], "knowledge_role_in_this_level": "主知识点推进", "image_prompt": "人物半蹲在溪旁，如释重负地注视着清澈水滴落入杯中。午后柔光洒在林间，溪水波光粼粼，呈现吉卜力式温馨治愈的质感。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file5.aitohumanize.com/file/9a93d42c68744906a898709bc26db285.png", "image_path": "./images/node_17.png"}}, {"id": "node_16_branch_1_decision", "content": "你将孔隙最小的细沙铺在最顶层，试图让溪水在进入瓶子的一瞬间就被滤除杂质。", "type": "decision", "metadata": {"choice_option": "依次填充细沙、碎石、木炭，利用最致密的细沙层在顶端第一时间挡住脏物。", "image_prompt": "吉卜力风格。人物蹲在溪边，正全神贯注地将细沙铺在滤瓶最顶端。背景林影斑驳，光线温暖而怀旧，透着湿润的水汽。中景构图。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file4.aitohumanize.com/file/221a2103e5d94e17841a73668a0b570e.png", "image_path": "./images/node_16_branch_1_decision.png"}}, {"id": "node_16_branch_1_fatal", "content": "溪水刚倒进去，顶层的细沙就被大颗粒杂质迅速糊住，过滤速度极慢且水流很快溢出。", "type": "fatal", "metadata": {"explanation": "这属于层级功能倒置误区。将最细的过滤层放在顶端，会导致它直接承受所有体积的杂质，从而迅速发生表面堵塞。正确的物理过滤应由粗到细，让大颗粒物质先被碎石拦截，保护下层微孔。", "physics_knowledge": "水的组成与净化\n\n错误原因：这属于层级功能倒置误区。将最细的过滤层放在顶端，会导致它直接承受所有体积的杂质，从而迅速发生表面堵塞。正确的物理过滤应由粗到细，让大颗粒物质先被碎石拦截，保护下层微孔。\n\n知识点：水由氢、氧元素组成（$H_2O$）。净化水涉及沉淀、过滤、吸附等手段。过滤是分离不溶性固体与液体的基本方法。科学的过滤层级应按孔隙由粗到细排列，使大颗粒杂质先被拦截，从而保护底层微孔。若将细滤层置于顶端，会导致表面迅速积垢并发生堵塞，降低净化效率。活性炭则利用多孔结构进行物理吸附，去除水中的色素与异味。", "knowledge_point": "水的组成与净化", "primary_knowledge_point": "水的组成与净化", "supporting_knowledge_points": ["地形地貌与地表特征"], "knowledge_role_in_this_level": "主知识点推进", "wrong_explanation": "这属于层级功能倒置误区。将最细的过滤层放在顶端，会导致它直接承受所有体积的杂质，从而迅速发生表面堵塞。正确的物理过滤应由粗到细，让大颗粒物质先被碎石拦截，保护下层微孔。", "correct_knowledge_ref": "过滤是分离不溶性固体与液体的一种基本方法。在多层过滤中，通过逐级减小滤料孔隙，可以实现高效拦截并延长过滤器使用寿命，活性炭则利用多孔结构进行物理吸附。", "image_prompt": "人物满脸愁容，手中简易滤水瓶因细沙堵塞，浑浊的水正漫过边缘溢出。夕阳洒在波光粼粼的溪边，林间透着温馨怀旧的氛围。中景构图。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/ed1da176d1a74da3bed65876d01ca2e4.png", "image_path": "./images/node_16_branch_1_fatal.png"}}, {"id": "node_16_branch_2_decision", "content": "你觉得木炭的净化功能最强，将其作为第一道关卡，而将孔隙最大的碎石放在最底部。", "type": "decision", "metadata": {"choice_option": "依次填充木炭、细沙、碎石，利用吸附能力最强的木炭层作为第一道核心防线。", "image_prompt": "人物半跪在清澈的溪旁，正专注地将黑色木炭填入瓶口，身旁堆着细沙与碎石。林间洒下柔和暖阳，溪水静静流淌，画面充满温馨的怀旧感。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file3.aitohumanize.com/file/971c8bf8f69644359b4d695f77f83f92.png", "image_path": "./images/node_16_branch_2_decision.png"}}, {"id": "node_16_branch_2_fatal", "content": "顶层的木炭很快被泥沙覆盖而失效，且底部的碎石无法阻挡细沙，出水变得更加浑浊。", "type": "fatal", "metadata": {"explanation": "这属于材料功能混淆误区。木炭主要通过微孔吸附溶解性杂质，若放在顶端会被泥沙迅速填满微孔而失去活性。同时，底部若无细致滤料支撑，上层的细沙和炭屑会随水流直接流失，导致过滤失败。", "physics_knowledge": "水的组成与净化\n\n错误原因：这属于材料功能混淆误区。木炭主要通过微孔吸附溶解性杂质，若放在顶端会被泥沙迅速填满微孔而失去活性。同时，底部若无细致滤料支撑，上层的细沙和炭屑会随水流直接流失，导致过滤失败。\n\n知识点：水的净化涉及物理过滤与吸附。过滤是利用滤料间隙分离不溶性固体与液体的过程。在多层净化体系中，滤料应按孔隙由大到小逐级分布，以实现分层拦截。木炭利用其多孔结构吸附色素与异味，若置于顶端，微孔易被泥沙堵塞而丧失活性；若底部缺乏细小滤料支撑，则易造成滤材流失。科学的层级结构不仅能确保出水质量，还能有效延长各级材料的使用寿命。", "knowledge_point": "水的组成与净化", "primary_knowledge_point": "水的组成与净化", "supporting_knowledge_points": ["地形地貌与地表特征"], "knowledge_role_in_this_level": "主知识点推进", "wrong_explanation": "这属于材料功能混淆误区。木炭主要通过微孔吸附溶解性杂质，若放在顶端会被泥沙迅速填满微孔而失去活性。同时，底部若无细致滤料支撑，上层的细沙和炭屑会随水流直接流失，导致过滤失败。", "correct_knowledge_ref": "过滤是分离不溶性固体与液体的一种基本方法。在多层过滤中，通过逐级减小滤料孔隙，可以实现高效拦截并延长过滤器使用寿命，活性炭则利用多孔结构进行物理吸附。", "image_prompt": "人物蹲在溪边，神色懊恼地看着水瓶流出浑浊泥水。夕阳余晖温柔，瓶内沙土混杂，氛围静谧而忧郁。中近景。人物形象参考输入的第一张，背景参考第二张。", "scene_transition": 0, "image_url": "https://file5.aitohumanize.com/file/eeb7897c6f004f4a807d4c31bff2b8d2.png", "image_path": "./images/node_16_branch_2_fatal.png"}}, {"id": "node_18", "content": "过滤水滋润了喉咙，体力逐渐恢复。然而，随着夕阳没入地平线，森林气温骤降。你感到一阵寒意，必须在黑夜降临前升起一堆火来保暖并驱赶野兽。 你搜集了一些干草和松木，模仿课本的样子开始钻木取火。然而，单纯的快速旋转木棒只让手掌磨出了水泡，松木板却毫无反应。你必须通过调整物理参数，让机械能更有效地转化为内能。", "type": "ep_start", "metadata": {"chapter_title": "第5关 微观热战：指尖上的摩擦力", "knowledge_point": "摩擦力", "primary_knowledge_point": "摩擦力", "supporting_knowledge_points": ["水的组成与净化"], "knowledge_role_in_this_level": "主知识点推进", "image_prompt": "夕阳下，人物正皱着眉，双手反复在一段松木板上搓动一根细木棒。她手掌泛红，面带难色，身边堆着搜集来的干草。背景是逐渐暗下来的森林和地平线上的余晖。画面为中景，透着吉卜力式的温馨与怀旧。人物形象参考输入的第一张。", "scene_transition": 0, "image_url": "https://file5.aitohumanize.com/file/a3b26f8a34574cc59d0ba30ad45a0b80.png", "image_path": "./images/node_18.png"}}, {"id": "node_19", "content": "为了在最短时间内产生足够引燃木屑的热量，你应当采取哪种力学操作策略？", "type": "normal", "metadata": {"knowledge_point": "摩擦力", "primary_knowledge_point": "摩擦力", "supporting_knowledge_points": ["水的组成与净化"], "image_prompt": "中景。暮色森林中，人物俯身半跪，双手用力按压并旋转木棍，神情坚毅。暖橘色夕阳穿透林间，画面呈现吉卜力式温馨怀旧感。人物形象参考输入的第一张，背景参考第二张（如果有的话）", "scene_transition": 0, "image_url": "https://file3.aitohumanize.com/file/85194d9eb1764eb8b06a6224c807e3f6.png", "image_path": "./images/node_19.png"}}, {"id": "node_20", "content": "你将身体重心前倾压在木棒上，在保证稳定旋转的同时用力向下按压木棒末端。", "type": "decision", "metadata": {"choice_option": "采用大幅增加垂直压力并配合中速旋转，利用压力与摩擦力的正相关性产热。", "image_prompt": "中景镜头。夕阳余晖洒在森林营地，透出温馨怀旧的氛围。人物全身紧绷，重心前倾压在木棒上，双手用力向下按压木棒末端并快速旋转。身旁堆放着干草和松木。人物形象参考输入的第一张。", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/a10c54ecd15a4ed492751af59b49b080.png", "image_path": "./images/node_20.png"}}, {"id": "node_21", "content": "随着压力增大，摩擦感显著增强，不一会儿，一股焦糊味混合着青烟从木板冒了出来。", "type": "ep_end", "metadata": {"physics_knowledge": "摩擦力\n\n解析：在接触面性质不变时，滑动摩擦力与正压力成正比。通过身体前倾增加垂直压力，能显著增大滑动摩擦力。摩擦力做功直接转化为热能，使木屑温度迅速达到燃点，实现能量的高效转化。\n\n知识点：滑动摩擦力公式为 f = μN（其中 μ 为动摩擦因数，N 为正压力）。摩擦力做功会导致机械能转化为物体的内能，使其温度升高。在取火场景中，增大压力是提升产热功率的核心手段。", "chapter_title": "第5关 微观热战：指尖上的摩擦力", "knowledge_point": "摩擦力", "primary_knowledge_point": "摩擦力", "supporting_knowledge_points": ["水的组成与净化"], "knowledge_role_in_this_level": "主知识点推进", "image_prompt": "人物俯身前倾，双手用力按压并快速旋转木棍，神情专注。木板接触点升起缕缕青烟，森林暮色深沉，光影温馨怀旧。吉卜力风格。人物形象参考输入的第一张，背景参考第二张。", "scene_transition": 0, "image_url": "https://file4.aitohumanize.com/file/68e6adb00b304099b4e54966e8659f9b.png", "image_path": "./images/node_21.png"}}, {"id": "node_20_branch_1_decision", "content": "你试着减轻手上的劲儿，试图通过更轻盈的姿态来获得更快的旋转频率和速度。", "type": "decision", "metadata": {"choice_option": "采用减轻垂直压力并配合极速旋转，利用高频运动做更多的功并积累运动能量。", "image_prompt": "吉卜力风格。暮色森林下，人物轻快飞速地揉搓木棒，眼神专注。中景视角，身旁堆着干草，余晖显得温馨而怀旧。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file5.aitohumanize.com/file/f84ab3e420a3402488e01788838dddcb.png", "image_path": "./images/node_20_branch_1_decision.png"}}, {"id": "node_20_branch_1_fatal", "content": "虽然木棒转得飞快，但木棒与木板之间几乎没有产生实质阻力，木头表面依然冰凉。", "type": "fatal", "metadata": {"explanation": "这陷入了“运动学替代动力学”的误区。根据 f = μN，如果压力太小，产生的摩擦力也会微乎其微。即使旋转频率再高，单位时间内摩擦做功产生的热量也无法抵消向周围散失的热量，温度无法升高。", "physics_knowledge": "摩擦力\n\n错误原因：这陷入了“运动学替代动力学”的误区。根据 f = μN，如果压力太小，产生的摩擦力也会微乎其微。即使旋转频率再高，单位时间内摩擦做功产生的热量也无法抵消向周围散失的热量，温度无法升高。\n\n知识点：滑动摩擦力遵循公式 $f = \\mu N$，其大小由动摩擦因数 $\\mu$ 与正压力 $N$ 共同决定。摩擦力做功实质上是机械能向内能转化的过程。在摩擦生热的物理模型中，产热功率受运动速度与摩擦力双重影响。若正压力不足，即便运动频率较高，微弱的摩擦力也无法产生足以抵消散热的能量。因此，增大正压力是强化摩擦做功、提升物体温度的核心动力学手段。", "knowledge_point": "摩擦力", "primary_knowledge_point": "摩擦力", "supporting_knowledge_points": ["水的组成与净化"], "knowledge_role_in_this_level": "主知识点推进", "wrong_explanation": "这陷入了“运动学替代动力学”的误区。根据 f = μN，如果压力太小，产生的摩擦力也会微乎其微。即使旋转频率再高，单位时间内摩擦做功产生的热量也无法抵消向周围散失的热量，温度无法升高。", "correct_knowledge_ref": "滑动摩擦力公式为 f = μN（其中 μ 为动摩擦因数，N 为正压力）。摩擦力做功会导致机械能转化为物体的内能，使其温度升高。在取火场景中，增大压力是提升产热功率的核心手段。", "image_prompt": "吉卜力风格，人物在昏暗暮色中快速搓动圆滑木棍，神情焦急疲惫。周围森林寒意渐浓，干草散落一地。中景镜头下，飞转的木棒与冰冷的木板毫无反应，氛围温馨却忧伤。人物形象参考输入的第一张，背景参考第二张（如果有的话）", "scene_transition": 0, "image_url": "https://file4.aitohumanize.com/file/a305091db7a3414c9913db443d2a24d8.png", "image_path": "./images/node_20_branch_1_fatal.png"}}, {"id": "node_20_branch_2_decision", "content": "你挑选了一根顶端更宽扁的木棒，希望通过增大接触面积来让更多的木纤维参与产热。", "type": "decision", "metadata": {"choice_option": "采用更粗的木棒并配合匀速旋转，利用接触面上更多的纤维参与摩擦来产热。", "image_prompt": "吉卜力风近景。夕阳余晖下，人物神情专注，正紧握一根顶端平宽的木棒在木板上尝试钻火。森林光影柔和怀旧，带着一丝晚秋的寒意。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file3.aitohumanize.com/file/feae932faacb45508198d99629dacb7d.png", "image_path": "./images/node_20_branch_2_decision.png"}}, {"id": "node_20_branch_2_fatal", "content": "你发现转动变得异常吃力，且热量被分散在较大表面上，木屑始终无法凝聚成火星。", "type": "fatal", "metadata": {"explanation": "这属于“面积影响摩擦力”的典型误区。在压力恒定的情况下，滑动摩擦力与接触面积的大小无关。增大面积反而会导致压强减小，热量分布过散，散热速度加快，使得局部区域更难达到燃点。", "physics_knowledge": "摩擦力\n\n错误原因：这属于“面积影响摩擦力”的典型误区。在压力恒定的情况下，滑动摩擦力与接触面积的大小无关。增大面积反而会导致压强减小，热量分布过散，散热速度加快，使得局部区域更难达到燃点。\n\n知识点：滑动摩擦力的大小遵循公式 $f = \\mu N$，其中 $\\mu$ 为动摩擦因数，$N$ 为正压力。在接触面性质与压力恒定的前提下，滑动摩擦力与接触面积的大小无关。摩擦力做功将机械能转化为内能，使物体温度升高。在摩擦取火等应用中，增大压力是提升产热功率的核心手段。若增大接触面积，会导致压强减小，热量分布过于分散且散热加快，局部区域将难以达到燃点。", "knowledge_point": "摩擦力", "primary_knowledge_point": "摩擦力", "supporting_knowledge_points": ["水的组成与净化"], "knowledge_role_in_this_level": "主知识点推进", "wrong_explanation": "这属于“面积影响摩擦力”的典型误区。在压力恒定的情况下，滑动摩擦力与接触面积的大小无关。增大面积反而会导致压强减小，热量分布过散，散热速度加快，使得局部区域更难达到燃点。", "correct_knowledge_ref": "滑动摩擦力公式为 f = μN（其中 μ 为动摩擦因数，N 为正压力）。摩擦力做功会导致机械能转化为物体的内能，使其温度升高。在取火场景中，增大压力是提升产热功率的核心手段。", "image_prompt": "人物满脸汗水，咬牙转动一根宽扁的粗木棍，显得异常吃力。背景是昏暗的黄昏森林，冷色调的暗影正在蔓延。中景视角展现出无助的姿态，身前的木板毫无火星，只有清冷的晚风拂过草丛。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file2.aitohumanize.com/file/75d57026a9404399b36cc4a6abe18ad5.png", "image_path": "./images/node_20_branch_2_fatal.png"}}, {"id": "node_22", "content": "看着那缕青烟，你屏住了呼吸。你小心翼翼地拨开木屑，发现核心部分已经形成了一团暗红色的炭火点。现在，你必须利用这些脆弱的火星，将火势转移到干草中。 你把火苗移向引火物，急忙把粗木头一股脑地压在火苗上，结果火苗不仅没变大，反而变黑冒烟快要熄灭了。你意识到火苗正在重压之下“窒息”，必须调整结构让它重新呼吸。", "type": "ep_start", "metadata": {"chapter_title": "第6关 荒野篝火：燃烧的生命线", "knowledge_point": "燃烧与灭火条件", "primary_knowledge_point": "燃烧与灭火条件", "supporting_knowledge_points": ["摩擦力"], "knowledge_role_in_this_level": "主知识点推进", "image_prompt": "近景处，人物焦虑地蹲在暮色森林中，正努力照看被重木压住、冒着浓烟的微弱火点。暖红余烬映照着脸庞，森林宁静而怀旧，尽显吉卜力温馨质感。人物形象参考输入的第一张，背景参考第二张。", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/4a935df7a85240aeacf04a150f6e9c54.png", "image_path": "./images/node_22.png"}}, {"id": "node_23", "content": "为了让微弱的火星转化为持续燃烧的篝火，你应当如何调整木材的堆叠结构？", "type": "normal", "metadata": {"knowledge_point": "燃烧与灭火条件", "primary_knowledge_point": "燃烧与灭火条件", "supporting_knowledge_points": ["摩擦力"], "image_prompt": "中景镜头下，人物焦虑地蹲在渐暗的林间，正小心地拨弄一堆冒着浓烟、即将熄灭的暗红火星。吉卜力画风的深秋森林透着寒意，微弱火光映亮了脸庞。人物形象参考输入的第一张，背景参考第二张。", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/f48f9efd6dd1417aa5474ac08c85fb9a.png", "image_path": "./images/node_23.png"}}, {"id": "node_24", "content": "你迅速撤掉重压的木头，将木棍像搭积木一样，交错留空地架设在火苗上方。", "type": "decision", "metadata": {"choice_option": "采用留有缝隙的架空“井”字形结构，利用空气对流为燃烧提供充足氧气。", "image_prompt": "人物神情专注，正轻手轻脚地将几根细木棍交错架在火星上方留出空隙。昏暗林间，微弱橘光映照着忙碌的双手，青烟袅袅升起，画面呈现吉卜力式的温馨怀旧感。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file2.aitohumanize.com/file/cf2d9e7b3fc74d31909245518a98c1f6.png", "image_path": "./images/node_24.png"}}, {"id": "node_25", "content": "空气顺着缝隙涌入，火苗瞬间由暗转红，伴随着噼啪声，粗壮的木材被顺利引燃。", "type": "ep_end", "metadata": {"physics_knowledge": "燃烧与灭火条件\n\n解析：在火堆内部创造空间，利用热空气上升产生的对流效应，使新鲜氧气源源不断地补充到燃烧核心。这解决了此前因木材过密导致的“缺氧”问题，使化学反应得以高效持续进行。\n\n知识点：可燃物、助燃物（通常为氧气）和温度达到着火点。在燃料充足的情况下，保证空气流通即提供足够的助燃物，是维持燃烧的关键条件。架空结构利用了空气热对流原理。", "chapter_title": "第6关 荒野篝火：燃烧的生命线", "knowledge_point": "燃烧与灭火条件", "primary_knowledge_point": "燃烧与灭火条件", "supporting_knowledge_points": ["摩擦力"], "knowledge_role_in_this_level": "主知识点推进", "image_prompt": "吉卜力风格，人物惊喜地蹲在火边，看着交错木架中窜出的橘红火苗。暖光照亮了幽暗森林，火星点点，氛围温馨治愈。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/d98eafca28d24e99847fca9dbdca3089.png", "image_path": "./images/node_25.png"}}, {"id": "node_24_branch_1_decision", "content": "你认为燃料越多火越旺，于是将木材整齐、紧密地码放在一起，试图让火苗吞噬它们。", "type": "decision", "metadata": {"choice_option": "采用紧密且无缝隙的实心方阵结构，利用更多的燃料为火源提供最充足的能量。", "image_prompt": "吉卜力风格。中景，人物神情认真，正将粗壮圆木紧密码放在火苗上。暮色森林氛围怀旧，木块间透出刺眼黑烟。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/e58510d1bf2c4999b22bc3acea227ac5.png", "image_path": "./images/node_24_branch_1_decision.png"}}, {"id": "node_24_branch_1_fatal", "content": "火堆冒出大量刺眼的黑烟，火星在密不透风的木块间逐渐熄灭，只剩下一片焦黑。", "type": "fatal", "metadata": {"explanation": "这陷入了“燃料总量决定论”的误区。极度紧密的堆叠挤占了氧气的空间，导致助燃物供应中断。这种不完全燃烧不仅产生大量黑烟，还会因为无法维持链式反应而导致火堆因缺氧而熄灭。", "physics_knowledge": "燃烧与灭火条件\n\n错误原因：这陷入了“燃料总量决定论”的误区。极度紧密的堆叠挤占了氧气的空间，导致助燃物供应中断。这种不完全燃烧不仅产生大量黑烟，还会因为无法维持链式反应而导致火堆因缺氧而熄灭。\n\n知识点：燃烧的发生与持续需同时具备可燃物、助燃物（通常为氧气）及温度达到着火点三个要素。在燃料充足的情况下，燃烧的剧烈程度取决于可燃物与氧气的接触面积及空气流通速度。若燃料堆叠过密，会因挤占氧气空间并阻断空气对流，导致不完全燃烧甚至因缺氧而熄灭。通过架空燃料建立通风结构，利用热对流原理确保助燃物持续供应并增大接触面积，是维持稳定燃烧的核心条件。", "knowledge_point": "燃烧与灭火条件", "primary_knowledge_point": "燃烧与灭火条件", "supporting_knowledge_points": ["摩擦力"], "knowledge_role_in_this_level": "主知识点推进", "wrong_explanation": "这陷入了“燃料总量决定论”的误区。极度紧密的堆叠挤占了氧气的空间，导致助燃物供应中断。这种不完全燃烧不仅产生大量黑烟，还会因为无法维持链式反应而导致火堆因缺氧而熄灭。", "correct_knowledge_ref": "可燃物、助燃物（通常为氧气）和温度达到着火点。在燃料充足的情况下，保证空气流通即提供足够的助燃物，是维持燃烧的关键条件。架空结构利用了空气热对流原理。", "image_prompt": "中景视角下，人物神情沮丧地蹲在堆得密不透风的木块旁，刺眼的黑烟正从焦黑的木材间升起，火星逐渐熄灭。幽暗的林间背景带着怀旧而忧郁的温馨感，画面细腻柔和。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file5.aitohumanize.com/file/b5184a8bd8914f7aac6aa7dff6cdc4f4.png", "image_path": "./images/node_24_branch_1_fatal.png"}}, {"id": "node_24_branch_2_decision", "content": "为了防止热量流失，你挑选了几块厚木头，像盖盖子一样严严实实地扣在火苗上。", "type": "decision", "metadata": {"choice_option": "采用大块木材从上方严密封盖的半圆顶结构，利用空间封闭减少热量的散失。", "image_prompt": "吉卜力风格。人物神情专注，正将厚实的木块像盖子般严实遮在微弱火苗上。近景中，橙色火光映红了人物的脸，背景是怀旧静谧的深夜树林。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file3.aitohumanize.com/file/14a9188a08774befa6edb9d96745560b.png", "image_path": "./images/node_24_branch_2_decision.png"}}, {"id": "node_24_branch_2_fatal", "content": "虽然内部暂时保持了温度，但由于氧气进不去，微弱的火星很快就彻底熄灭了。", "type": "fatal", "metadata": {"explanation": "这属于“热量流失保护误区”。虽然出发点是保温，但严密封闭的操作实质上构成了“隔绝氧气”的灭火条件。没有了空气循环，燃烧产生的二氧化碳会积聚并抑制反应，最终导致火堆窒息。", "physics_knowledge": "燃烧与灭火条件\n\n错误原因：这属于“热量流失保护误区”。虽然出发点是保温，但严密封闭的操作实质上构成了“隔绝氧气”的灭火条件。没有了空气循环，燃烧产生的二氧化碳会积聚并抑制反应，最终导致火堆窒息。\n\n知识点：燃烧的维持必须同时满足可燃物、助燃物（通常为氧气）及温度达到着火点三个要素。灭火的本质是破坏上述燃烧条件之一。在实际操作中，严密封闭虽能减少热量散失，但其核心物理效应是阻断了空气对流，导致氧气耗尽且二氧化碳积聚，从而引发窒息灭火。与之相反，保持空气流通或采用架空结构，能确保充足的助燃物供应，利用热对流原理维持化学反应的持续进行。", "knowledge_point": "燃烧与灭火条件", "primary_knowledge_point": "燃烧与灭火条件", "supporting_knowledge_points": ["摩擦力"], "knowledge_role_in_this_level": "主知识点推进", "wrong_explanation": "这属于“热量流失保护误区”。虽然出发点是保温，但严密封闭的操作实质上构成了“隔绝氧气”的灭火条件。没有了空气循环，燃烧产生的二氧化碳会积聚并抑制反应，最终导致火堆窒息。", "correct_knowledge_ref": "可燃物、助燃物（通常为氧气）和温度达到着火点。在燃料充足的情况下，保证空气流通即提供足够的助燃物，是维持燃烧的关键条件。架空结构利用了空气热对流原理。", "image_prompt": "吉卜力风格，人物失落地蹲在地上，看着严实堆叠的厚重木头，最后一缕青烟从缝隙中散去。昏暗的森林被夜色笼罩，冰冷的月光洒在寂静的空地上，氛围凄清。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file3.aitohumanize.com/file/777a568d58a248fb89704ecab80964e6.png", "image_path": "./images/node_24_branch_2_fatal.png"}}, {"id": "node_26", "content": "火堆熊熊燃起，橘红色的火光驱散了黑暗。你坐在火边恢复了体力，开始思考如何利用这团火发出信号。就在这时，远处山梁似乎有微弱的手电光闪过。 远处山梁上有白光在晃动，那一定是搜救队！你迅速翻出反光镜。由于距离遥远，你必须利用身边的火堆作为光源，将光束精准地反射到那个光点所在的方向，才能引起他们的注意。", "type": "ep_start", "metadata": {"chapter_title": "第7关 反射定律：捕捉希望的光束", "knowledge_point": "反射定律", "primary_knowledge_point": "反射定律", "supporting_knowledge_points": ["燃烧与灭火条件"], "knowledge_role_in_this_level": "主知识点推进", "image_prompt": "人物坐在篝火旁，神情专注地举起反光镜。橘红火光映照脸庞，背景是幽暗森林与远山微光。中景构图，吉卜力式温馨氛围。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file4.aitohumanize.com/file/fbb9293488f34bc6a85f54279c95ea3d.png", "image_path": "./images/node_26.png"}}, {"id": "node_27", "content": "为了让火光准确反射并照射到远处山梁的目标光点，你应当如何调整镜面的角度？", "type": "normal", "metadata": {"knowledge_point": "反射定律", "primary_knowledge_point": "反射定律", "supporting_knowledge_points": ["燃烧与灭火条件"], "image_prompt": "吉卜力风格中景，人物在暖橘火光中专注转动镜子，捕捉光亮投向远方。山脊白光闪动，深夜森林氛围温馨怀旧。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file5.aitohumanize.com/file/d4e70b1f28154f248ba2f0f7fc4b6976.png", "image_path": "./images/node_27.png"}}, {"id": "node_28", "content": "你缓慢倾斜镜面，使镜面垂直的中心线正好指向火堆与远处光点的中间位置。", "type": "decision", "metadata": {"choice_option": "使镜面法线指向火堆与目标连线的角平分线，利用反射角等于入射角原理。", "image_prompt": "吉卜力风格。人物专注蹲在暖橘篝火旁，轻调镜子捕捉火光。一道橘红光斑划破黑夜，照向远方闪烁白光的山脊，氛围温馨怀旧。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file2.aitohumanize.com/file/c2083a65717b47b8bc2d2feae96ccda9.png", "image_path": "./images/node_28.png"}}, {"id": "node_29", "content": "一道耀眼的橘红色光斑划破黑暗，精准落在了山梁上，那边的白光立刻开始闪烁。", "type": "ep_end", "metadata": {"physics_knowledge": "反射定律\n\n解析：在光学系统里，要使光线从光源射向目标，镜面的法线必须平分入射光线和反射光线的夹角。通过这种几何对准，你成功将火光的能量集中射向了救援人员，符合反射定律的几何关系。\n\n知识点：反射光线、入射光线与法线在同一平面内；反射光线与入射光线分居法线两侧；反射角等于入射角。法线是垂直于镜面的基准线，是角度计算的核心。", "chapter_title": "第7关 反射定律：捕捉希望的光束", "knowledge_point": "反射定律", "primary_knowledge_point": "反射定律", "supporting_knowledge_points": ["燃烧与灭火条件"], "knowledge_role_in_this_level": "主知识点推进", "image_prompt": "人物神情专注，稳举镜子将暖橘火光化作耀眼光束，划破静谧黑夜投向远方闪烁的山脊。吉卜力风格，火光柔和温馨，充满希望。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file5.aitohumanize.com/file/f86ce9d129e849e6abb79ab2466ada35.png", "image_path": "./images/node_29.png"}}, {"id": "node_28_branch_1_decision", "content": "你将镜面完全垂直于火堆放置，试图让镜子捕捉到最强烈的火光来增加亮度。", "type": "decision", "metadata": {"choice_option": "使镜面法线直接指向火堆，利用镜面正对着火光以接收并反射最强的能量。", "image_prompt": "吉卜力风格，中景人物蹲在火旁，正将镜子垂直对着火苗。静谧森林中，橘红火光映着专注面庞，氛围温馨怀旧。人物形象参考输入的第一张，背景参考第二张。", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/3f4cfeacea6a4af4b7b1ea30a1f5499b.png", "image_path": "./images/node_28_branch_1_decision.png"}}, {"id": "node_28_branch_1_fatal", "content": "光线垂直射向镜面后直接原路返回了火堆，远处的山梁依然漆黑，没有任何光斑。", "type": "fatal", "metadata": {"explanation": "这是一个典型的“垂直反射误区”。当法线指向光源时，入射角为0°，根据反射角等于入射角的原理，反射角也为0°。此时光线会沿原路返回光源，无法射向远方的救援目标。", "physics_knowledge": "反射定律\n\n错误原因：这是一个典型的“垂直反射误区”。当法线指向光源时，入射角为0°，根据反射角等于入射角的原理，反射角也为0°。此时光线会沿原路返回光源，无法射向远方的救援目标。\n\n知识点：光的反射定律是描述光在界面处改变传播方向的基本规律。其核心内容包括：反射光线、入射光线与法线位于同一平面内；反射光线与入射光线分居法线两侧；反射角等于入射角，即公式：\n\n$$\\theta_r = \\theta_i$$\n\n\n\n在应用中，法线是垂直于反射面的基准线。当光线垂直射向镜面时，入射角为0°而非90°，反射角相应也为0°，光线将沿原路返回。若需改变光路以射向特定目标，必须调整镜面倾角，使入射光线与法线之间产生大于0°的夹角，从而利用反射角等于入射角的原理改变光线的传播方向。", "knowledge_point": "反射定律", "primary_knowledge_point": "反射定律", "supporting_knowledge_points": ["燃烧与灭火条件"], "knowledge_role_in_this_level": "主知识点推进", "wrong_explanation": "这是一个典型的“垂直反射误区”。当法线指向光源时，入射角为0°，根据反射角等于入射角的原理，反射角也为0°。此时光线会沿原路返回光源，无法射向远方的救援目标。", "correct_knowledge_ref": "反射光线、入射光线与法线在同一平面内；反射光线与入射光线分居法线两侧；反射角等于入射角。法线是垂直于镜面的基准线，是角度计算的核心。", "image_prompt": "人物神情焦急，火光在镜中反照出无助的脸庞。中景构图中，橘色营火在漆黑深林间跳动，远方山梁寂静无光，吉卜力风格透着怀旧与迷茫。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file5.aitohumanize.com/file/8cd88cc8688440a9920b7ecc081b4e8b.png", "image_path": "./images/node_28_branch_1_fatal.png"}}, {"id": "node_28_branch_2_decision", "content": "你调整镜子，使其反光面完全朝向山梁上的光点，希望对方能直接看到镜面反射。", "type": "decision", "metadata": {"choice_option": "使镜面法线直接指向远处的目标点，利用镜面正对着救援者以实现对准。", "image_prompt": "橘红色的篝火边，人物神情专注地举起反光镜，将镜面完全朝向远方漆黑山梁上的微弱光点。飞舞的火星映照着人物期盼的脸庞，深夜的森林静谧而深邃。吉卜力风格，光影柔和且富有怀旧感。人物形象参考输入的第一张，背景参考第二张（如果有的话）", "scene_transition": 0, "image_url": "https://file2.aitohumanize.com/file/57ea5f5a2c4643ad9d3e66ff6b649a3e.png", "image_path": "./images/node_28_branch_2_decision.png"}}, {"id": "node_28_branch_2_fatal", "content": "火光倾斜地射入镜面，却以更大的角度偏向了山谷另一侧，救援人员完全没察觉。", "type": "fatal", "metadata": {"explanation": "这属于“目标直指误区”。如果你让法线直接指向目标，入射光（火光）会从侧面射入，反射光必然会偏向目标的另一侧。只有考虑到光源的位置并调整法线方向，才能命中目标。", "physics_knowledge": "反射定律\n\n错误原因：这属于“目标直指误区”。如果你让法线直接指向目标，入射光（火光）会从侧面射入，反射光必然会偏向目标的另一侧。只有考虑到光源的位置并调整法线方向，才能命中目标。\n\n知识点：反射光线、入射光线与法线在同一平面内，且分居法线两侧；反射角等于入射角（$\\theta_r = \\theta_i$）。法线是垂直于反射界面的几何基准线。若将法线直接指向目标点，由于入射光线与法线之间存在夹角，反射光线必将偏向目标的另一侧。正确做法是使法线处于入射光线与目标连线的角平分线上，通过调整镜面倾角，确保反射角严格等于入射角，从而使反射光线精准命中目标。", "knowledge_point": "反射定律", "primary_knowledge_point": "反射定律", "supporting_knowledge_points": ["燃烧与灭火条件"], "knowledge_role_in_this_level": "主知识点推进", "wrong_explanation": "这属于“目标直指误区”。如果你让法线直接指向目标，入射光（火光）会从侧面射入，反射光必然会偏向目标的另一侧。只有考虑到光源的位置并调整法线方向，才能命中目标。", "correct_knowledge_ref": "反射光线、入射光线与法线在同一平面内；反射光线与入射光线分居法线两侧；反射角等于入射角。法线是垂直于镜面的基准线，是角度计算的核心。", "image_prompt": "中景。吉卜力风格，人物神色焦急地调整镜子，火堆映出的橘红光束却斜斜地射入漆黑山谷，错过了远方山梁的微弱白光。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file3.aitohumanize.com/file/d997d2d5923148b4afb029d1f4ead71b.png", "image_path": "./images/node_28_branch_2_fatal.png"}}, {"id": "node_30", "content": "远处闪烁的回应信号让你心中升起了希望！救援者已经发现了你的大致方位，正朝这边赶来，但密林遮挡了视线，你需要发出更清晰的声音信号引导他们。 搜救员的呼喊声断断续续传来，但你沙哑的嗓子只能发出微弱气声。夜晚森林风声呼啸，搜救员的灯光正逐渐向侧方移动，如果你不能发出足够清晰的声音，他们很可能会与你擦肩而过。", "type": "ep_start", "metadata": {"chapter_title": "第8关 绝处 //file2.aitohumanize.com/file/9b4388c7e2884dc1ae2c7cf3734c59ac.png", "image_path": "./images/node_33.png"}}, {"id": "node_32_branch_1_decision", "content": "你深吸一口气，憋红了脸，对着远处的灯光用尽全身力气吹出一阵阵低沉的哨声。", "type": "decision", "metadata": {"choice_option": "采用大响度长时间的低沉哨声，认为只要声音足够大就能盖过风声传得最远。", "image_prompt": "人物憋红了脸，在摇曳树影中用力吹着哨子，神情焦急。背景是风声呼啸的幽暗密林，远方的搜救灯火正渐行渐远。中景视角呈现出一种吉卜力式的怀旧与紧迫感。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file4.aitohumanize.com/file/32cec107aa8b4d79998957d8f6f8a6d5.png", "image_path": "./images/node_32_branch_1_decision.png"}}, {"id": "node_32_branch_1_fatal", "content": "低沉的哨声很快就湮没在同样低频的阵风中，远方的灯光似乎正在移走。", "type": "fatal", "metadata": {"explanation": "这陷入了“响度决定论”的误区。低频哨声极易被背景风声掩蔽。用力吹只能提高响度，不能直接增加振动频率，缺乏足够振动频率的声音在空气传播中会迅速衰减，无法到达远方。", "physics_knowledge": "声音的产生与传播\n\n错误原因：这混淆了响度与频率对传播效果的影响。虽然你试图增大响度（振幅），但低频波段极易被风声掩盖和吸收。声音的穿透力主要取决于频率（音调）的差异化，而非单纯的音量大小。\n\n知识点：声音源于物体的振动，其物理特性由音调（频率）、响度（振幅）和音色共同决定。在声波传播过程中，响度代表能量强度，而音调决定波形的疏密。在存在背景噪声的复杂环境中，单纯通过增大振幅（响度）来提升传播效果，往往会因低频波段易被环境音掩盖而受限。具有高频率特征的声音在空气传播中更具辨识度，其穿透力源于频率与背景噪声的显著差异化，而非仅依赖能量密度的堆叠。", "knowledge_point": "声音的产生与传播", "primary_knowledge_point": "声音的产生与传播", "supporting_knowledge_points": ["反射定律"], "knowledge_role_in_this_level": "主知识点推进", "wrong_explanation": "这混淆了响度与频率对传播效果的影响。虽然你试图增大响度（振幅），但低频波段极易被风声掩盖和吸收。声音的穿透力主要取决于频率（音调）的差异化，而非单纯的音量大小。", "correct_knowledge_ref": "声音由物体振动产生，特性包括音调、响度和音色。音调由振动频率决定。在复杂背景噪声中，高频声音（高音调）比低频声音具有更好的辨识度和传播优势，不易被环境音掩盖。", "image_prompt": "吉卜力风格，中景。人物表情焦急，正憋红脸徒劳地吹响哨子，背景是风声呼啸的深夜密林，远处山梁上微弱的救援灯光正渐行渐远，氛围怀旧且忧伤。人物形象参考输入的第一张，背景参考第二张（如果有的话）。", "scene_transition": 0, "image_url": "https://file1.aitohumanize.com/file/851aaa98267b4b2687bf0868ee0b52c8.png", "image_path": "./images/node_32_branch_1_fatal.png"}}, {"id": "node_32_branch_2_decision", "content": "你试图通过极快地抖动声带发出一种尖细的颤音，认为振动快才能传得更远。", "type": "decision", "metadata": {"choice_option": "采用高频率的嗓音，认为声带振动比口哨更快，只要振动得足够快，声音就能传得更远。", "image_prompt": "中景视角。人物仰头紧揪领口，正费力地尝试发声，神情焦虑而疲惫。跳动的橘红色火光映亮侧脸，背景是静谧深邃的密林。吉卜力画风下，光影交织出怀旧而     <script>
        document.addEventListener('DOMContentLoaded', function() {
            let storyGraph = null;
            let currentNodeId = null;
            const gameContainerEl = document.getElementById('game-container');
            const storyContentEl = document.getElementById('story-content');
            const storyContentOverlayEl = document.getElementById('story-content-overlay');
            const storyImageEl = document.getElementById('story-image');
            const nodeIdEl = document.getElementById('node-id');
            const choicesContainerEl = document.getElementById('choices-container');
            const endingMessageEl = document.getElementById('ending-message');
            const fatalMessageEl = document.getElementById('fatal-message');
            const retryButtonEl = document.getElementById('retry-button');
            const restartButtonEl = document.getElementById('restart-button');
            const loadingEl = document.getElementById('loading');
            
            // 物理知识点相关元素（简化版本）
            const physicsKnowledgeOverlayEl = document.getElementById('physics-knowledge-overlay');
            const physicsKnowledgeTitleEl = document.getElementById('physics-knowledge-title');
            const physicsKnowledgeTextEl = document.getElementById('physics-knowledge-text');
            const physicsKnowledgeCloseBtnEl = document.getElementById('physics-knowledge-close');
            
            // 失败分析相关元素
            const failureAnalysisOverlayEl = document.getElementById('failure-analysis-overlay');
            const failureAnalysisSubtitleEl = document.getElementById('failure-analysis-subtitle');
            const failureAnalysisTextEl = document.getElementById('failure-analysis-text');
            const failureAnalysisCloseBtnEl = document.getElementById('failure-analysis-close');

            function updateTopTextSafeArea() {
                const leftBase = window.innerWidth <= 768 ? 76 : 20;
                const leftGap = window.innerWidth <= 768 ? 12 : 18;
                const measuredNodeWidth = nodeIdEl ? Math.ceil(nodeIdEl.getBoundingClientRect().width) : 0;
                const leftSafe = leftBase + measuredNodeWidth + leftGap;
                storyContentOverlayEl.style.setProperty('--top-text-left-safe', `${leftSafe}px`);
            }

            window.addEventListener('resize', updateTopTextSafeArea);

            function escapeHtml(text) {
                return String(text || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function decorateInlineEmphasis(text) {
                return text.replace(/\*\*([^*]+)\*\*/g, '<span class="inline-emphasis">$1</span>');
            }

            function preprocessRichText(rawText) {
                let text = rawText || '';
                text = text.replace(/\\\\/g, '\\');
                text = text.replace(/\\\(/g, '\\(');
                text = text.replace(/\\\)/g, '\\)');
                return text.trim();
            }

            function stripDuplicateLeadingTitle(rawText, titleText) {
                const text = preprocessRichText(rawText);
                const title = String(titleText || '').trim();
                if (!text || !title) {
                    return text;
                }

                const lines = text.split('\n');
                if (!lines.length) {
                    return text;
                }

                const firstLine = lines[0].trim().replace(/^\*\*|\*\*$/g, '').replace(/:$/, '');
                if (firstLine.toLowerCase() !== title.toLowerCase()) {
                    return text;
                }

                return lines.slice(1).join('\n').trim();
            }

            function getChoiceButtonLabel(node) {
                if (node && node.metadata && node.metadata.choice_option) {
                    return node.metadata.choice_option;
                }
                return (node && node.content) || '';
            }

            function createChoiceButton(nextNodeId) {
                const nextNode = findNodeById(nextNodeId);
                if (!nextNode) {
                    return null;
                }

                const button = document.createElement('button');
                button.className = 'choice-button';
                const label = document.createElement('span');
                label.className = 'choice-button-text';
                label.textContent = getChoiceButtonLabel(nextNode);
                button.appendChild(label);
                button.onclick = () => {
                    currentNodeId = nextNodeId;
                    displayNode(currentNodeId);
                };
                return button;
            }

            function formatRichText(rawText, options = {}) {
                const text = preprocessRichText(rawText);
                if (!text) {
                    return '';
                }

                const knownLabels = ['Analysis', 'Knowledge Point', 'Cause of Error', 'Reason for Error', 'Failure Analysis', 'Explanation'];
                const normalizedText = text
                    .replace(/\*\*\s*(Analysis|Knowledge Point|Cause of Error|Reason for Error|Failure Analysis|Explanation)\s*:\s*\*\*/gi, '**$1:** ')
                    .replace(/(\*\*(?:Analysis|Knowledge Point|Cause of Error|Reason for Error|Failure Analysis|Explanation):\*\*)\s*\*\*\s*/gi, '$1 ')
                    .replace(/([^\n])(\*\*\s*(?:Analysis|Knowledge Point|Cause of Error|Reason for Error|Failure Analysis|Explanation)\s*:\s*)/gi, '$1\n$2')
                    .replace(/([^\n])((?:Analysis|Knowledge Point|Cause of Error|Reason for Error|Failure Analysis|Explanation)\s*:)/gi, '$1\n$2')
                    .replace(/\n{3,}/g, '\n\n');
                const lines = normalizedText.split('\n');
                const htmlParts = [];

                let currentSection = null;
                let looseParagraphs = [];

                function pushLooseParagraphs() {
                    if (!looseParagraphs.length) {
                        return;
                    }
                    const paragraphHtml = decorateInlineEmphasis(escapeHtml(looseParagraphs.join(' ').trim()));
                    if (paragraphHtml) {
                        htmlParts.push(`<div class="formatted-paragraph">${paragraphHtml}</div>`);
                    }
                    looseParagraphs = [];
                }

                function flushCurrentSection() {
                    if (!currentSection) {
                        return;
                    }
                    const sanitizedLines = currentSection.lines
                        .map(line => line.replace(/^\*\*\s+(?=[^*])/, '').replace(/\s+\*\*$/, '').trimEnd())
                        .filter((line, index, arr) => line !== '**' && (line !== '' || (index > 0 && index < arr.length - 1)));
                    const bodyText = sanitizedLines.join('\n').trim();
                    const bodyHtml = bodyText ? `<div class="formatted-paragraph">${decorateInlineEmphasis(escapeHtml(bodyText)).replace(/\n/g, '<br>')}</div>` : '';
                    htmlParts.push(`<section class="formatted-section"><div class="formatted-section-title">${currentSection.title}</div>${bodyHtml}</section>`);
                    currentSection = null;
                }

                lines.forEach(rawLine => {
                    let line = rawLine.trim();
                    if (!line || line === '**') {
                        if (currentSection && currentSection.lines.length) {
                            currentSection.lines.push('');
                        }
                        return;
                    }

                    line = line.replace(/^\*\*\s+(?=[^*])/, '');
                    line = line.replace(/\s+\*\*$/, '');

                    const headingMatch = line.match(/^\*\*\s*(Analysis|Knowledge Point|Cause of Error|Reason for Error|Failure Analysis|Explanation)\s*:\s*\*\*?\s*(.*)$/i)
                        || line.match(/^(Analysis|Knowledge Point|Cause of Error|Reason for Error|Failure Analysis|Explanation)\s*:\s*(.*)$/i);

                    if (headingMatch) {
                        pushLooseParagraphs();
                        flushCurrentSection();
                        currentSection = {
                            title: headingMatch[1],
                            lines: headingMatch[2] ? [headingMatch[2].trim()] : []
                        };
                        return;
                    }

                    if (currentSection) {
                        currentSection.lines.push(line);
                        return;
                    }

                    if (knownLabels.some(label => line.replace(/[*:]/g, '').toLowerCase() === label.toLowerCase().replace(/[*:]/g, ''))) {
                        pushLooseParagraphs();
                        flushCurrentSection();
                        currentSection = { title: line.replace(/^\*\*|\*\*$/g, '').replace(/:$/, ''), lines: [] };
                        return;
                    }

                    looseParagraphs.push(line);
                });

                pushLooseParagraphs();
                flushCurrentSection();

                return `<div class="formatted-content">${htmlParts.join('')}</div>`;
            }
            
            // 静态模式优先读取页面内嵌JSON，确保双击HTML也可运行
            try {
                const embeddedEl = document.getElementById('embedded-story-graph-data');
                if (!embeddedEl || !embeddedEl.textContent) {
                    throw new Error('embedded story graph is missing');
                }
                storyGraph = JSON.parse(embeddedEl.textContent);
                loadingEl.style.display = 'none';
                startStory();
            } catch (error) {
                console.error('Error loading embedded story graph:', error);
                loadingEl.textContent = 'Failed to load embedded story data.';
            }
            
            // 开始故事
            function startStory() {
                currentNodeId = storyGraph.start_node_id;
                displayNode(currentNodeId);
            }
            
            // 显示节点内容
            function displayNode(nodeId) {
                const node = findNodeById(nodeId);
                if (!node) return;
                
                // 重置UI状态
                choicesContainerEl.innerHTML = '';
                choicesContainerEl.classList.remove('show-choices');
                endingMessageEl.style.display = 'none';
                fatalMessageEl.style.display = 'none';
                restartButtonEl.style.display = 'none';
                
                // 清除可能存在的失败分析内容
                const existingFailureAnalysis = fatalMessageEl.querySelector('div');
                if (existingFailureAnalysis) {
                    fatalMessageEl.removeChild(existingFailureAnalysis);
                }
                
                // 重置物理知识点显示状态
                physicsKnowledgeOverlayEl.classList.remove('show');
                gameContainerEl.classList.remove('blur-background');
                physicsKnowledgeTitleEl.textContent = '';
                physicsKnowledgeTextEl.innerHTML = '';
                
                // 重置失败分析显示状态
                failureAnalysisOverlayEl.classList.remove('show');
                gameContainerEl.classList.remove('blur-background');
                failureAnalysisSubtitleEl.textContent = '';
                failureAnalysisTextEl.innerHTML = '';
                
                // 重置章节标题显示状态
                const chapterTitleOverlayEl = document.getElementById('chapter-title-overlay');
                chapterTitleOverlayEl.classList.remove('show', 'fade-out');
                
                // 保存当前内容，用于在收起动画期间保持显示
                const currentContent = storyContentEl.textContent;
                const currentNodeIdText = nodeIdEl.textContent;
                
                // 先移除show-content类，触发收起动画
                storyContentOverlayEl.classList.remove('show-content');
                
                // 等待收起动画完成后，再更新内容并展开
                setTimeout(() => {
                    // 更新节点内容 - 在展开动画开始前更新内容
                    storyContentEl.textContent = (node.content || '').replace(/\s+/g, ' ').trim();
                    nodeIdEl.textContent = `Node ID: ${node.id}`;
                    requestAnimationFrame(updateTopTextSafeArea);
                    
                    // 触发展开动画
                    storyContentOverlayEl.classList.add('show-content');
                    
                    // 显示节点图片（如果有）
                    if (node.metadata && node.metadata.image_path) {
                        // 将反斜杠转换为正斜杠，并确保路径格式正确
                        console.log('Original image path:', node.metadata.image_path);
                        // 处理JSON中的双斜杠
                        let imagePath = node.metadata.image_path.replace(/\\/g, '/');
                        // 静态包下保留相对路径，不再强制改成以 / 开头的绝对路径
                        if (imagePath.startsWith('./') || imagePath.startsWith('../') || /^[a-zA-Z]:\//.test(imagePath)) {
                            storyImageEl.src = imagePath;
                        } else if (imagePath.startsWith('/')) {
                            storyImageEl.src = imagePath;
                        } else if (imagePath.startsWith('output/')) {
                            storyImageEl.src = './' + imagePath.substring(7);
                        } else {
                            storyImageEl.src = './' + imagePath;
                        }
                        console.log('Processed image path:', storyImageEl.src);
                        storyImageEl.classList.add('fade-in');
                        
                        // 添加图片加载错误处理
                        storyImageEl.onerror = function() {
                            console.error('Failed to load image:', fullImagePath);
                            // 使用默认背景
                            storyImageEl.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1200 800"><rect width="100%" height="100%" fill="%23222"/><text x="50%" y="50%" font-size="30" fill="%23fff" text-anchor="middle" dominant-baseline="middle">Educational Serious Game</text></svg>';
                        };
                        
                        // 添加图片加载成功处理
                        storyImageEl.onload = function() {
                            console.log('Successfully loaded image:', fullImagePath);
                        };
                    } else {
                        // 如果没有图片，使用默认背景
                        storyImageEl.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1200 800"><rect width="100%" height="100%" fill="%23222"/><text x="50%" y="50%" font-size="30" fill="%23fff" text-anchor="middle" dominant-baseline="middle">Educational Serious Game</text></svg>';
                    }
                    
                    // 检查是否是ep_start节点，显示章节标题字幕
                    if (node.type === 'ep_start' && node.metadata && node.metadata.chapter_title) {
                        setTimeout(() => {
                            // 设置章节标题内容
                            chapterTitleOverlayEl.textContent = node.metadata.chapter_title;
                            // 显示章节标题字幕
                            chapterTitleOverlayEl.classList.add('show');
                            
                            // 4秒后淡出字幕
                            setTimeout(() => {
                                chapterTitleOverlayEl.classList.add('fade-out');
                                // 淡出动画完成后移除show类
                                setTimeout(() => {
                                    chapterTitleOverlayEl.classList.remove('show', 'fade-out');
                                }, 1000);
                            }, 4000);
                        }, 500); // 延迟500ms开始显示字幕
                    }
                    
                    // 检查是否是ep_end节点
                    if (node.type === 'ep_end') {
                        // 延迟显示物理知识点或暂停提示（简化版本）
                        setTimeout(() => {
                            // 检查是否还有后续节点
                            const nextNodeIds = storyGraph.edges[nodeId] || [];
                            const hasNextNode = nextNodeIds.length > 0;
                            
                            // 如果有物理知识点，显示知识点
                            if (node.metadata && node.metadata.physics_knowledge) {
                                // 添加轻微背景模糊效果
                                gameContainerEl.classList.add('blur-background');
                                
                                physicsKnowledgeTitleEl.textContent = (node.metadata && node.metadata.knowledge_point) || '';
                                const physicsKnowledgeText = stripDuplicateLeadingTitle(node.metadata.physics_knowledge, (node.metadata && node.metadata.knowledge_point) || '');
                                physicsKnowledgeTextEl.innerHTML = formatRichText(physicsKnowledgeText, { mode: 'knowledge' });
                                
                                // 显示物理知识点覆盖层
                                physicsKnowledgeOverlayEl.classList.add('show');
                                
                                // 使用KaTeX渲染数学公式
                                setTimeout(() => {
                                    if (typeof renderMathInElement !== 'undefined') {
                                        try {
                                            renderMathInElementCustom(physicsKnowledgeTextEl);
                                            console.log('KaTeX物理知识点公式渲染完成');
                                        } catch (err) {
                                            console.error('KaTeX渲染出错:', err);
                                        }
                                    } else {
                                        console.warn('KaTeX未加载完成，延迟渲染...');
                                        // 如果KaTeX还未加载，延迟重试
                                        setTimeout(() => {
                                            if (typeof renderMathInElement !== 'undefined') {
                                                try {
                                                    renderMathInElementCustom(physicsKnowledgeTextEl);
                                                    console.log('KaTeX物理知识点公式渲染完成（延迟重试）');
                                                } catch (err) {
                                                    console.error('KaTeX渲染出错:', err);
                                                }
                                            }
                                        }, 500);
                                    }
                                }, 100);
                            } else {
                                // 没有物理知识点，显示暂停提示
                                gameContainerEl.classList.add('blur-background');
                                // 根据是否有下一个节点显示不同的提示信息
                                let promptText = '';
                                if (hasNextNode) {
                                    promptText = 'Level complete - click Continue to keep reading.';
                                } else {
                                    promptText = 'Story complete - click Continue to view the result.';
                                }
                                physicsKnowledgeTextEl.innerHTML = promptText;
                                physicsKnowledgeTitleEl.textContent = '';
                                
                                // 显示物理知识点覆盖层
                                physicsKnowledgeOverlayEl.classList.add('show');
                                
                                // 使用KaTeX渲染（即使没有公式也保持一致性）
                                setTimeout(() => {
                                    if (typeof renderMathInElement !== 'undefined') {
                                        try {
                                            renderMathInElementCustom(physicsKnowledgeTextEl);
                                            console.log('KaTeX提示文本渲染完成');
                                        } catch (err) {
                                            console.error('KaTeX渲染出错:', err);
                                        }
                                    } else {
                                        console.warn('KaTeX未加载完成，延迟渲染...');
                                        // 如果KaTeX还未加载，延迟重试
                                        setTimeout(() => {
                                            if (typeof renderMathInElement !== 'undefined') {
                                                try {
                                                    renderMathInElementCustom(physicsKnowledgeTextEl);
                                                    console.log('KaTeX提示文本渲染完成（延迟重试）');
                                                } catch (err) {
                                                    console.error('KaTeX渲染出错:', err);
                                                }
                                            }
                                        }, 500);
                                    }
                                }, 100);
                            }
                        }, 4000); // 4秒后开始显示
                    }
                    
                    // 根据节点类型显示不同内容
                    if (node.type === 'ending') {
                        // 结束节点
                        setTimeout(() => {
                            endingMessageEl.style.display = 'block';
                            restartButtonEl.style.display = 'block';
                        }, 1500);
                    } else if (node.type === 'fatal') {
                        // fatal节点 - 显示失败信息和重新选择按钮
                        setTimeout(() => {
                            // 添加背景模糊效果
                            gameContainerEl.classList.add('blur-background');
                            
                            // 添加失败分析内容（优先 failure_analysis，其次 physics_knowledge）
                            const failureSource = node.metadata && (node.metadata.failure_analysis || node.metadata.physics_knowledge);
                            if (failureSource) {
                                failureAnalysisSubtitleEl.textContent = (node.metadata && node.metadata.knowledge_point) || '';
                                const failureText = stripDuplicateLeadingTitle(failureSource, (node.metadata && node.metadata.knowledge_point) || '');
                                failureAnalysisTextEl.innerHTML = formatRichText(failureText, { mode: 'failure' });
                                
                                // 显示失败分析覆盖层
                                failureAnalysisOverlayEl.classList.add('show');
                                
                                // 使用KaTeX渲染数学公式
                                setTimeout(() => {
                                    if (typeof renderMathInElement !== 'undefined') {
                                        try {
                                            renderMathInElementCustom(failureAnalysisTextEl);
                                            console.log('KaTeX失败分析公式渲染完成');
                                        } catch (err) {
                                            console.error('KaTeX渲染出错:', err);
                                        }
                                    } else {
                                        console.warn('KaTeX未加载完成，延迟渲染...');
                                        // 如果KaTeX还未加载，延迟重试
                                        setTimeout(() => {
                                            if (typeof renderMathInElement !== 'undefined') {
                                                try {
                                                    renderMathInElementCustom(failureAnalysisTextEl);
                                                    console.log('KaTeX失败分析公式渲染完成（延迟重试）');
                                                } catch (err) {
                                                    console.error('KaTeX渲染出错:', err);
                                                }
                                            }
                                        }, 500);
                                    }
                                }, 100);
                            } else {
                                // 没有失败分析内容，显示基本失败信息
                                failureAnalysisTextEl.innerHTML = 'That choice was incorrect. Please choose again.';
                                failureAnalysisSubtitleEl.textContent = (node.metadata && node.metadata.knowledge_point) || '';
                                
                                // 显示失败分析覆盖层
                                failureAnalysisOverlayEl.classList.add('show');
                            }
                        }, 1500);
                        
                        // 仍然检查是否有多个连接边，显示选择按钮
                        const nextNodeIds = storyGraph.edges[nodeId] || [];
                        if (nextNodeIds.length > 1) {
                            // 有多个连接边，显示选择按钮
                            setTimeout(() => {
                                nextNodeIds.forEach((nextNodeId, index) => {
                                    const button = createChoiceButton(nextNodeId);
                                    if (button) {
                                        choicesContainerEl.appendChild(button);
                                    }
                                });
                                choicesContainerEl.classList.add('show-choices');
                            }, 4000);
                        }
                    } else {
                        // 任何类型的节点，只要有多于一个连接边，就显示选择按钮
                        const nextNodeIds = storyGraph.edges[nodeId] || [];
                        
                        // 检查是否是ep_end节点，如果是则暂停等待用户点击
                        if (node.type === 'ep_end') {
                            // ep_end节点不自动继续，等待用户点击物理知识点覆盖层的继续按钮（简化版本）
                            physicsKnowledgeCloseBtnEl.textContent = 'Continue';
                            physicsKnowledgeCloseBtnEl.onclick = () => {
                                physicsKnowledgeOverlayEl.classList.remove('show');
                                gameContainerEl.classList.remove('blur-background');
                                // 清空物理知识点内容，防止残留
                                physicsKnowledgeTextEl.innerHTML = '';
                                // 检查是否还有下一个节点
                                if (nextNodeIds.length > 0) {
                                    // 继续到下一个节点
                                    currentNodeId = nextNodeIds[0];
                                    displayNode(currentNodeId);
                                }
                                // 如果没有下一个节点，则保持当前状态，不执行任何操作
                            };
                        } else {
                            // 如果只有一个连接边，直接跳转，不显示选项
                            if (nextNodeIds.length === 1) {
                                // 非ep_end节点，正常自动继续
                                setTimeout(() => {
                                    currentNodeId = nextNodeIds[0];
                                    displayNode(currentNodeId);
                                }, 3000); // 延迟3秒跳转，让用户有时间阅读过渡情节内容
                            } else if (nextNodeIds.length > 1) {
                                // 有多个连接边，显示选择按钮
                                setTimeout(() => {
                                    nextNodeIds.forEach((nextNodeId, index) => {
                                        const button = createChoiceButton(nextNodeId);
                                        if (button) {
                                            choicesContainerEl.appendChild(button);
                                        }
                                    });
                                    choicesContainerEl.classList.add('show-choices');
                                }, 4000);
                            } else {
                                // 没有连接边，显示结束信息
                                setTimeout(() => {
                                    endingMessageEl.style.display = 'block';
                                    restartButtonEl.style.display = 'block';
                                }, 1500);
                            }
                        }
                    }
                }, 500);

            }
            
            // 根据ID查找节点
            function findNodeById(nodeId) {
                return storyGraph.nodes.find(node => node.id === nodeId);
            }
            
            // 重新开始按钮点击事件
            restartButtonEl.addEventListener('click', startStory);
            
            // 重新选择按钮点击事件
            retryButtonEl.addEventListener('click', () => {
                fatalMessageEl.style.display = 'none';
                
                // 清除可能存在的失败分析内容
                const existingFailureAnalysis = fatalMessageEl.querySelector('div');
                if (existingFailureAnalysis) {
                    fatalMessageEl.removeChild(existingFailureAnalysis);
                }
                
                // 继续播放到下一个节点
                const nextNodeIds = storyGraph.edges[currentNodeId] || [];
                if (nextNodeIds.length > 0) {
                    // 如果只有一个连接的节点，直接显示它
                    if (nextNodeIds.length === 1) {
                        currentNodeId = nextNodeIds[0];
                        displayNode(currentNodeId);
                    }
                    // 如果有多个连接的节点，显示选择按钮
                    else {
                        nextNodeIds.forEach((nextNodeId, index) => {
                            const button = createChoiceButton(nextNodeId);
                            if (button) {
                                choicesContainerEl.appendChild(button);
                            }
                        });
                        choicesContainerEl.classList.add('show-choices');
                    }
                }
            });
            
            // 物理知识点关闭按钮点击事件（简化版本默认行为）
            physicsKnowledgeCloseBtnEl.addEventListener('click', () => {
                physicsKnowledgeOverlayEl.classList.remove('show');
                gameContainerEl.classList.remove('blur-background');
                
                // 清空物理知识点内容，防止残留
                physicsKnowledgeTextEl.innerHTML = '';
                
                // 检查当前节点是否还有后续节点，如果没有则显示结束信息
                const currentNode = findNodeById(currentNodeId);
                if (currentNode && currentNode.type === 'ep_end') {
                    const nextNodeIds = storyGraph.edges[currentNodeId] || [];
                    if (nextNodeIds.length === 0) {
                        // 没有连接边，显示结束信息
                        setTimeout(() => {
                            endingMessageEl.style.display = 'block';
                            restartButtonEl.style.display = 'block';
                        }, 500);
                    }
                }
            });
            
            // 失败分析关闭按钮点击事件
            failureAnalysisCloseBtnEl.addEventListener('click', () => {
                failureAnalysisOverlayEl.classList.remove('show');
                gameContainerEl.classList.remove('blur-background');
                
                // 清空失败分析内容，防止残留
                failureAnalysisTextEl.innerHTML = '';
                
                // 继续播放到下一个节点
                const nextNodeIds = storyGraph.edges[currentNodeId] || [];
                if (nextNodeIds.length > 0) {
                    // 如果只有一个连接的节点，直接显示它
                    if (nextNodeIds.length === 1) {
                        currentNodeId = nextNodeIds[0];
                        displayNode(currentNodeId);
                    }
                    // 如果有多个连接的节点，显示选择按钮
                    else {
                        nextNodeIds.forEach((nextNodeId, index) => {
                            const button = createChoiceButton(nextNodeId);
                            if (button) {
                                choicesContainerEl.appendChild(button);
                            }
                        });
                        choicesContainerEl.classList.add('show-choices');
                    }
                }
            });
            
            // 跳转到故事图按钮点击事件
            document.getElementById('goto-graph').addEventListener('click', () => {
                window.location.href = './story-graph-visualization.html';
            });
        });
    </script>
</body>
</html>
